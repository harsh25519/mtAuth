spring:

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: auth_service

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  datasource:
    hikari:
      initialization-fail-timeout: -1
      minimum-idle: 0
      idle-timeout: 30000
      max-lifetime: 600000
      keepalive-time: 0

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    bdj.hkb.auth_service: INFO